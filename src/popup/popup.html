<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Social Graph Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Social Graph Extractor</h1>
      <span class="badge">v0.1.0 · Phase 1</span>
    </header>

    <section class="counts" id="counts">
      <div class="stat"><span class="num" id="total">0</span><span class="label">people</span></div>
      <div class="by-network" id="by-network"></div>
    </section>

    <section class="actions">
      <button id="scrape">Scrape this page</button>
      <button id="open-graph">Open graph</button>
      <button id="export">Export JSON</button>
    </section>

    <p class="status" id="status" role="status"></p>
    <p class="hint">
      LinkedIn: open <b>My Network → Connections</b>, then Scrape.
    </p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
